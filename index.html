<!DOCTYPE html>
<html lang="en">
<head>
    <title>Animal Charity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🐾 Animal Care</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#mission">Mission</a>
        <a href="#programs">Programs</a>
        <a href="#donate">Donate</a>
    </nav>
</header>

<section id="home" class="fade">
    <h2>Help Animals, Save Lives ❤️</h2>
    <p>Join us in protecting and caring for animals in need.</p>
    <button onclick="scrollToDonate()">Donate Now</button>
</section>

<section id="mission" class="fade">
    <h2>Our Mission</h2>
    <p>We rescue, treat, and find homes for stray animals.</p>
</section>

<section id="programs" class="fade">
    <h2>Our Programs</h2>
    <div class="cards">
        <div class="card">🐶 Rescue</div>
        <div class="card">💉 Treatment</div>
        <div class="card">🏠 Adoption</div>
    </div>
</section>

<section id="donate" class="fade">
    <h2>Donate Now</h2>

    <form id="donationForm">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <input type="number" placeholder="Amount (₹)" required>
        <button type="submit">Donate</button>
    </form>

    <p id="msg"></p>
</section>

<footer>
    <p>© 2026 Animal Care Charity</p> 
</footer>

<script src="script.js"></script>
</body>
</html>
